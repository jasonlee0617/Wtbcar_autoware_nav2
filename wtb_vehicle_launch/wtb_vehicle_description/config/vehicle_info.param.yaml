# ================================================================
# vehicle_info.param.yaml - Autoware 车辆物理参数
# 被 Autoware 的 individual_params 系统自动加载
# ================================================================
/**:
  ros__parameters:
    # The body box in wtb_car.xacro is 1.30 x 0.80 x 1.00, while the overall
    # vehicle width reaches 0.98 m when the wheel width is included.
    vehicle_width: 0.98
    vehicle_length: 1.30
    vehicle_height: 1.00

    # The visual wheel centers in wtb_car.xacro remain at x=+/-0.35, but the
    # real car uses a calibrated wheelbase of 0.82 m in wtb_car.
    wheel_base: 0.82
    wheel_tread: 0.86
    wheel_radius: 0.20
    wheel_width: 0.12

    max_steer_angle: 0.6109
    max_steer_angle_rate: 2.0

    max_velocity: 1.0
    max_acceleration: 1.0
    min_acceleration: -1.0

    cog_to_rear_axle: 0.41
    cog_to_front_axle: 0.41

    front_overhang: 0.24
    rear_overhang: 0.24
    left_overhang: 0.06
    right_overhang: 0.06
