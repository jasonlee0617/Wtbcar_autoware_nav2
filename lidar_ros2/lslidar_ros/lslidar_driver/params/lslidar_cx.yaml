/cx/lslidar_driver_node:
  ros__parameters:
    packet_rate: 847.0         # C16 10Hz: ~847, C32 10Hz: ~1695
    device_ip: 192.168.1.200  #雷达ip
    msop_port: 2368           #雷达目的数据端口
    difop_port: 2369          #雷达目的设备端口
    pcl_type: false           #点云类型 true: xyzi
    add_multicast: false      #雷达是否使用组播模式 true: 使用组播模式
    group_ip: 224.1.1.2       #组播ip
    use_time_service: false   #雷达是否使用外部授时(GPS PTP NTP) true: 使用外部授时
    min_range: 0.75           #雷达扫描最小距离(小于此值的点会被过滤)
    max_range: 200.0          #雷达扫描最大距离(大于此值的点会被过滤)
    #不屏蔽角度时 都为0    可以屏蔽单个角度或者多个角度
    #对应位置的角度左值和角度右值之间为屏蔽掉的角度，左值和右值数量必须相等
    angle_disable_min: [-6000,12000]      #雷达扫描最小角度裁剪 单位 0.01°
    angle_disable_max: [6000,24000]       #雷达扫描最大角度裁剪 单位 0.01°
    # angle_disable_min: [0]      #雷达扫描最小角度裁剪 单位 0.01°
    # angle_disable_max: [0]      #雷达扫描最大角度裁剪 单位 0.01°
    distance_unit: 0.4
    horizontal_angle_resolution: 0.18      # C16@10Hz:0.18  C16@5Hz:0.09  C32@10Hz:0.36
    frame_id: laser           #点云帧id (需与URDF中link名称一致)
    topic_name: /point_cloud_raw #点云话题名称
    publish_scan: true       #是否发布 laserscan话题
    scan_num: 7               # C16线号范围0-15, 7为中间线(近水平)
    coordinate_opt: false     #在ROS坐标系中点云0度角对应方向  true: x轴正方向   false:Y轴方向为起始0°
                        
