ekf_filter_node:
  ros__parameters:
    publish_tf: true
    world_frame: "odom"
    odom_frame: "odom"
    base_link_frame: "base_footprint"

    frequency: 30.0
    two_d_mode: true

    # === 只启用 IMU ===
    imu0: /imu
    imu0_config: [false, false, false,   # x, y, z (不用位置)
                  true,  true,  true,    # roll, pitch, yaw (用姿态)
                  false, false, false,   # vx, vy, vz
                  true,  true,  true,    # vroll, vpitch, vyaw (角速度)
                  true,  true,  true]    # ax, ay, az (线加速度)

    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    imu0_queue_size: 10

    # 关闭所有其他输入
    # odom0, pose0 等不要配置