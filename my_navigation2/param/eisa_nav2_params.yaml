#amcl:用于机器人定位的自适应蒙特卡罗定位算法节点
amcl:
  ros__parameters:
    filter_queue_size: 400  # 默认值可能为50或100
    queue_size: 400    # 增大 AMCL 的订阅队列
    time_stamp_tolerance: 1.0  # 允许 0.5 秒的时间戳差异
    transform_tolerance: 1.0  # 单位为秒，增加该值
    #是否使用模拟时间
    use_sim_time: True
    # set_initial_pose: true #设置为 true，从 initial_pose 参数设置初始姿态，不等待 initial_pose 消息。
    #用于表示不同类型的噪声参数，取值范围通常在 0 到 1 之间，这里都设置为 0.2。
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    #机器人基坐标系的名称，一般为 base_footprint，代表机器人底盘的坐标系。
    base_frame_id: "base_footprint"
    #激光束跳过的最小距离，当激光束测量值小于此距离时，可跳过该测量。
    beam_skip_distance: 0.1
    #激光束跳过的误差阈值，若误差超过此值，可跳过该激光束测量。
    beam_skip_error_threshold: 0.5
    #激光束跳过的阈值，用于决定是否跳过激光束测量。
    beam_skip_threshold: 0.2
    #是否启用激光束跳过功能。
    do_beamskip: false
    # 全局坐标系的名称，通常为 map，表示地图坐标系
    global_frame_id: "map"
    # 短距离激光测量的指数衰减率
    lambda_short: 0.1
    # 激光传感器的最大测量范围。
    laser_max_range: 25.0
    # 激光传感器的最小测量范围。
    laser_min_range: -1.0
    # 激光似然场模型的最大距离。
    laser_likelihood_max_dist: 10.0
    # 激光模型的类型，这里是 likelihood_field（似然场模型）。
    laser_model_type: "likelihood_field"
    # 每次更新使用的最大激光束数量。
    max_beams: 100
    # 粒子滤波器中使用的最大粒子数。
    max_particles: 4000
    # 粒子滤波器中使用的最小粒子数。
    min_particles: 1000
    # 里程计坐标系的名称，一般为 odom。
    # odom_frame_id: "odom_combined"
    odom_frame_id: "odom"
    # 粒子滤波器的误差阈值。
    pf_err: 0.05
    #粒子滤波器的一个参数。
    pf_z: 0.99
    #快速恢复时的一个参数
    recovery_alpha_fast: 0.0
    #慢速恢复时的一个参数
    recovery_alpha_slow: 0.0
    #重采样的时间间隔。
    resample_interval: 2
    #机器人模型类型 差速驱动
    # robot_model_type: "differential"
    robot_model_type: "nav2_amcl::DifferentialMotionModel" #插件类的完全限定类型。
    #保存位姿的频率
    save_pose_rate: 0.5
    #激光测量噪声的标准差，用于似然场模型。
    sigma_hit: 0.1
    #tf_broadcast：是否广播 TF 变换，true表示广播。
    tf_broadcast: true
    #更新的最小角度变化，单位为弧度。
    # 更新过滤器的最小旋转 / 平移阈值
    #执行过滤器更新之前需要进行旋转运动。
    update_min_a: 0.05
    #更新的最小距离变化，单位为米。
    #执行过滤器更新之前需要进行平移运动
    update_min_d: 0.05
    #激光击中目标的概率，用于似然场模型。
    z_hit: 0.7
    #激光测量值为最大值的概率，用于似然场模型。
    z_max: 0.05
    #激光测量值为随机值的概率，用于似然场模型。
    z_rand: 0.3
    #激光测量值为短距离的概率，用于似然场模型。
    z_short: 0.05
    #激光扫描数据的话题名称，这里是scan。
    scan_topic: scan

amcl_map_client:
  ros__parameters:
    use_sim_time: True

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: True

