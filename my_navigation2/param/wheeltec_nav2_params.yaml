# 本地控制器服务器节点。
controller_server:
  ros__parameters:
    # use_sim_time: True
    use_sim_time: False

    # 控制器的更新频率（单位：Hz）。
    controller_frequency: 20.0
    #最小转弯半径
    min_turning_radius: 1.5
    # 最小 x 轴速度阈值。
    min_x_velocity_threshold: 0.01
    # 最小 y 轴速度阈值。
    min_y_velocity_threshold: 0.01
    # 最小角度速度阈值。
    min_theta_velocity_threshold: 0.01
    # 失败容忍度。
    failure_tolerance: 0.3
    odom_topic: /ekf_odom
    # 控制话题的名称，这里是cmd_vel。
    cmd_vel_topic: "/cmd_vel"  # 添加控制话题配置

    # 进度检查器插件的名称。
    progress_checker_plugin: "progress_checker"
    # 目标检查器插件的名称列表。
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    # 控制器插件的名称列表。
    controller_plugins: ["FollowPath"]
   
    # 进度检查器的参数配置。
    # 用于检查机器人是否在向目标前进
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # 机器人必须移动的最小半径。如果机器人在指定时间内没有达到这个半径，则认为没有进展。
      required_movement_radius: 0.5
      # 机器人必须移动的时间。如果机器人在指定时间内没有达到所需的最小半径，则认为没有进展。
      movement_time_allowance: 10.0
    # 通用目标检查器的参数配置。
    # 用于检查机器人是否到达了目标位置
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      #在XY平面上的目标位置容忍度。如果机器人的位置在XY平面上的误差小于这个值，则认为机器人已经到达目标。
      xy_goal_tolerance: 0.35 # 目标点附近的安全范围
      #在Yaw方向上的目标位置容忍度。如果机器人的Yaw方向的误差小于这个值，则认为机器人已经到达目标。
      yaw_goal_tolerance: 0.35
    
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.35                          #期望使用的最大线速度。
      lookahead_dist: 0.3                              #用于查找前瞻点的前瞻距离
      min_lookahead_dist: 0.3                          #使用速度缩放前瞻距离时的最小前瞻距离阈值
      max_lookahead_dist: 0.9                          #使用速度缩放前瞻距离时的最大前瞻距离阈值
      lookahead_time: 1.5                              #投射速度以找到速度缩放的前瞻距离所需的时间。也称为前瞻增益。
      rotate_to_heading_angular_vel: 0.4               #如果使用旋转至航向，则这是要使用的角速度。
      transform_tolerance: 1.0                         #TF 变换容差
      use_velocity_scaled_lookahead_dist: false        #是否使用速度缩放的前瞻距离或常数lookahead_distance
      min_approach_linear_velocity: 0.05               # 接近目标时应用的最小速度阈值
      approach_velocity_scaling_dist: 1.0              # 距离变换路径末端的积分距离，在此距离处开始应用速度缩放。
      #注意：默认为代价地图的前向范围减去一个代价地图单元长度。
      use_collision_detection: true                    #是否启用碰撞检测。
      max_allowed_time_to_collision_up_to_carrot: 1.0  #use_collision_detection为真，投射速度命令以检查碰撞的时间true。它被限制为所选前瞻距离的最大距离。
      use_regulated_linear_velocity_scaling: true      #是否使用受控的曲率特征
      use_cost_regulated_linear_velocity_scaling: true #是否使用受管制的接近障碍物功能
      regulated_linear_scaling_min_radius: 0.9         #触发调节功能的转弯半径。请记住，转弯越急，半径就越小
      regulated_linear_scaling_min_speed: 0.25         #受调节特征能够发送的最小速度，以确保即使在高曲率的高成本空间中仍可实现过程。
      use_rotate_to_heading: false                      # 使用完整规划器时是否启用旋转到粗略航向和目标方向。
      #注意：建议对除阿克曼机器人之外的所有机器人类型启用，因为阿克曼机器人无法原地旋转。
      rotate_to_heading_min_angle: 0.785               #use_rotate_to_heading如果启用，则路径方向和起始机器人方向之间的差异将触发原地旋转。
      max_angular_accel: 10.0                           #旋转至航向时允许的最大角加速度（如果启用）
      max_robot_pose_search_dist: 10.0                 #沿路径搜索最接近机器人姿势的最大综合距离。#-->10.0
      #注意：默认设置为最大代价地图范围，因此除非本地代价地图内存在循环，否则不应手动设置。
      use_interpolation: false                         #启用路径上姿势之间的插值以进行前瞻点选择。帮助稀疏路径避免引起不连续的指令速度。
      cost_scaling_dist: 0.6                           #如果启用，则触发线速度缩放的最小障碍物距离。
      #注意：设置的值应小于或等于inflation_radiuscostmap 膨胀层中设置的值，因为膨胀用于计算与障碍物的距离
      cost_scaling_gain: 1.0 #乘数增益应小于或等于 1.0，用于在 范围内有障碍物时进一步调整速度cost_scaling_dist。
      #注意：值越低，减速越快。
      # inflation_cost_scaling_factor: 3.0               #局部代价地图中膨胀层设置的值cost_scaling_factor。
      #注意：该值应与使用膨胀单元格值准确计算与障碍物的距离完全相同
      goal_dist_tol: 0.08
      allow_reversing: true

controller_server_rclcpp_node:
  ros__parameters:
    # use_sim_time: True
    use_sim_time: False

local_costmap:
  local_costmap:
    ros__parameters:
      transform_tolerance: 1.0  # 容忍 0.5 秒的时间偏差（足够覆盖系统时钟的微小波动）
      use_strict_timestamps: false  # 禁用严格时间戳检查

      #本地代价地图的更新频率，单位为 Hz。
      update_frequency: 1.0
      # 本地代价地图的发布频率，单位为 Hz。
      publish_frequency: 1.0
      # 全局坐标系的名称，
      global_frame: odom
      # 机器人基座的名称，
      robot_base_frame: base_footprint
      # use_sim_time: True
      use_sim_time: False
      # 是否使用滚动窗口，true表示使用。
      rolling_window: true
      # 本地代价地图的宽度，单位为米。
      width: 4
      # 本地代价地图的高度，单位为米。
      height: 4
      # 本地代价地图的分辨率，单位为米 / 像素。
      resolution: 0.05

      origin_x: -2.0   # = -width / 2
      origin_y: -2.0   # = -height / 2

      footprint: "[ [0.6, -0.35], [0.6, 0.35], [-0.6, 0.35], [-0.6, -0.35] ]" 
      footprint_padding: 0.3  # 添加安全边距,单位m

      # plugins: ["voxel_layer", "inflation_layer","obstacle_layer"] #插件包括:{“体素层”，“障碍层”，“膨胀层”}
      
      plugins: ["obstacle_layer", "inflation_layer"] #插件包括:{“体素层”，“障碍层”，“膨胀层”}
      # 障碍物层的参数配置。
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        combination_method: 1 #障碍物与地图的组合方式。值为1表示取最大值，适合动态避障。
        scan:
          topic: /scan
          # topic: /scan_raw
          max_obstacle_height: 2.0                 #可检测障碍物的最大高度（米）
          clearing: True                           #是否启用障碍物清除功能
          marking: True                            #是否启用障碍物标记功能
          data_type: "LaserScan"                   #数据类型
          raytrace_max_range: 20.0                 #控制光线追踪从代价地图中清除障碍物的最大范围 
          raytrace_min_range: 0.0                  #控制光线追踪从代价地图中清除障碍物的最大范围 
          obstacle_max_range: 11.0                  #控制代价地图上标记障碍物的最大范围
          obstacle_min_range: 0.0                  #控制代价地图上标记障碍物的最小范围
          observation_persistence: 0.0             # 减少观测持续时间 0.0
          # expected_update_rate: 0.5                # 更新频率
          expected_update_rate: 1.0
          obstacle_range: 10.0      # 关键！
          raytrace_range: 12.0      # 应 > obstacle_range
          queue_size: 100

      # 膨胀层的参数配置。
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 代价缩放因子
        # cost_scaling_factor的值越大：障碍物周围的代价值越高，路径规划器会更倾向于避开这些区域。这可以提高避障的保守性，但可能导致机器人在某些情况下规划出更曲折的路径。
        cost_scaling_factor: 1.0
        # 膨胀半径，根据车辆大小和避障需求设置，
        inflation_radius: 0.2 # 通常比全局代价地图小

      # 体素层的参数配置。
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 3.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0                  #可检测障碍物的最大高度（米）
          clearing: True                            #是否启用障碍物清除功能
          marking: True                             #是否启用障碍物标记功能
          data_type: "LaserScan"                    #数据类型
          raytrace_max_range: 20.0                  #控制光线追踪从代价地图中清除障碍物的最大范围 
          raytrace_min_range: 0.0                   #控制光线追踪从代价地图中清除障碍物的最小范围 
          obstacle_max_range: 11.0                  #控制代价地图上标记障碍物的最大范围
          obstacle_min_range: 0.0                   #控制代价地图上标记障碍物的最小范围
      
      #静态层
      static_layer:
        map_subscribe_transient_local: True
      
      always_send_full_costmap: True #是否每次更新时都发送完整的成本图，而不是更新
  
      
  local_costmap_client:
    ros__parameters:
      # use_sim_time: True
      use_sim_time: False
  
  local_costmap_rclcpp_node:
    ros__parameters:
      # use_sim_time: True
      use_sim_time: False

global_costmap:
  global_costmap:
    ros__parameters:
      # 全局代价地图的更新频率
      update_frequency: 1.0
      # 全局代价地图的发布频率，单位为 Hz。
      publish_frequency: 1.0
      # 全局坐标系的名称
      global_frame: map
      # 机器人基坐标系的名称
      robot_base_frame: base_footprint
      # use_sim_time: True
      use_sim_time: False
      # 机器人的半径，单位为米
      footprint: "[ [0.6, -0.35], [0.6, 0.35], [-0.6, 0.35], [-0.6, -0.35] ]"
      footprint_padding: 0.3  # 添加安全边距,单位m   
      # 全局代价地图的分辨率，单位为米 / 像素。
      resolution: 0.05
      # 是否跟踪未知空间，true表示跟踪。
      # 设为 true 时，未知区域会被视为可通行但高代价。若环境已知（如室内地图），可改为 false，减少规划时的无效计算。
      track_unknown_space: false
      # 全局代价地图使用的插件列表
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      # 障碍物层的参数配置。
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        combination_method: 1 #障碍物与地图的组合方式。值为1表示取最大值，适合动态避障。
        scan:
          topic: /scan
          max_obstacle_height: 2.0                 #可检测障碍物的最大高度（米）
          clearing: True                           #是否启用障碍物清除功能
          marking: True                            #是否启用障碍物标记功能
          data_type: "LaserScan"                   #数据类型
          raytrace_max_range: 20.0                 #控制光线追踪从代价地图中清除障碍物的最大范围 
          raytrace_min_range: 0.0                  #控制光线追踪从代价地图中清除障碍物的最大范围 
          obstacle_max_range: 11.0                  #控制代价地图上标记障碍物的最大范围
          obstacle_min_range: 0.0                  #控制代价地图上标记障碍物的最小范围
          observation_persistence: 0.0             # 减少观测持续时间
          # expected_update_rate: 0.5                # 更新频率
          expected_update_rate: 1.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      # 膨胀层的参数配置。
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0 # 代价随距离增长的速率
        inflation_radius: 0.2  # 至少为机器人对角线一半（0.566m）+ 安全余量
      always_send_full_costmap: True

  global_costmap_client:
    ros__parameters:
      # use_sim_time: True
      use_sim_time: False
  
  global_costmap_rclcpp_node:
    ros__parameters:
      # use_sim_time: True
      use_sim_time: False

map_server:
  ros__parameters:
    # use_sim_time: True
    use_sim_time: False
    # 地图配置文件的名称，这里是turtlebot3_world.yaml。
    yaml_filename: "turtlebot3_world.yaml"

map_saver:
  ros__parameters:
    # use_sim_time: True
    use_sim_time: False
    # 保存地图的超时时间，单位为秒。
    save_map_timeout: 5.0
    # 默认的空闲阈值。
    free_thresh_default: 0.25
    # 默认的占用阈值。
    occupied_thresh_default: 0.65
    # 是否订阅瞬态本地地图。
    map_subscribe_transient_local: True

# 是全局规划器服务器节点。
planner_server:
  ros__parameters:
    validate_path: true  # 路径有效性验证
    planner_min_distance: 0.0  # 允许零间距（谨慎使用）

    tf_cache_time: 10.0  # 增加 TF 缓存时间
    #期望的规划器频率，单位为 Hz。
    expected_planner_frequency: 10.0
    # use_sim_time: True
    use_sim_time: False
    use_astar: true              # 使用A*算法（比Dijkstra更高效）

    planner_plugins: ["GridBased"] #规划器插件类型，需要与BT Tree文件匹配
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      # 在无法到达目标点时，允许的偏差范围（单位：米）。如果路径规划无法精确到达目标点，规划器会尝试在容忍范围内找到一个可行的路径
      tolerance: 0.25 
      footprint_padding: 0.3  #添加安全边距,单位m            
      # 下采样设置        
      downsample_costmap: false           # whether or not to downsample the map
      downsampling_factor: 1              # multiplier for the resolution of the costmap layer (e.g. 2 on a 5cm costmap would be 10cm)
      # 是否允许机器人在未知区域中行驶。
      allow_unknown: false                # allow traveling in unknown space
      # 最大迭代次数，用于路径搜索。如果设置为-1，则不限制迭代次数。
      max_iterations: 1000000             # maximum total iterations to search for before failing (in case unreachable), set to -1 to disable
      # 在接近目标时的最大迭代次数。
      max_on_approach_iterations: 1000    # maximum number of iterations to attempt to reach goal once in tolerance, 2D only
      # 路径规划的最大时间（单位：秒）。
      max_planning_time: 3.0              # max time in s for planner to plan, smooth, and upsample. Will scale maximum smoothing and upsampling times based on remaining time after planning.
      # 搜索时使用的运动模型
      motion_model_for_search: "DUBIN"   # 2D Moore, Von Neumann; Hybrid Dubin, Redds-Shepp; State Lattice set internally
      # 成本和路径平滑参数
      # 在搜索时，用于避开高成本区域的成本乘数。
      cost_travel_multiplier: 2.0         
      angle_quantization_bins: 72        
      analytic_expansion_ratio: 3.5      
      analytic_expansion_max_cost: 200.0
      # 路径或车辆的最小转弯半径。
      minimum_turning_radius: 0.10       
      # 反向运动的惩罚值。
      reverse_penalty: 2.0              
      # 方向变化的惩罚值。
      change_penalty: 0.3                 
      # 非直线运动的惩罚值。
      non_straight_penalty: 1.3          
      # 在障碍图动态规划距离扩展启发式中，应用于高成本区域的惩罚值。
      cost_penalty: 2.5                  
      lookup_table_size: 20.0             
      # 是否缓存障碍图动态规划距离扩展启发式。
      cache_obstacle_heuristic: True     
      # 是否对路径进行平滑处理。  
      smooth_path: true
      # 路径平滑器的参数，包括最大迭代次数、平滑权重、数据权重和容忍度。
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
    
planner_server_rclcpp_node:
  ros__parameters:
    # use_sim_time: True
    use_sim_time: False

smoother_server:
  ros__parameters:
    # use_sim_time: True
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 0.2  #TF transform tolerance.
      max_its: 1000
      do_refinement: True

# 是恢复行为服务器节点。
behavior_server:  # Humble and newer
# recoveries_server:  # Galactic and earlier
  ros__parameters:
  # 代价地图的话题名称。
    costmap_topic: local_costmap/costmap_raw
    # 机器人足迹的话题名称。
    footprint_topic: local_costmap/published_footprint
    # 恢复行为的循环频率，单位为 Hz。
    cycle_frequency: 10.0
    recovery_behavior_enabled: true  # 启用恢复行为

    behavior_plugins: ["spin", "backup", "wait"]  # Humble and later
    # recovery_plugins: ["spin", "backup", "wait"]  # Galactic and earlier
    spin:
      plugin: "nav2_behaviors/Spin"
      max_rotational_vel: 1.2     # 提高最大旋转速度（原1.0）
      rotational_acc_lim: 3.0     # 提高角加速度（原2.0）
      spin_dist: 1.57             # 旋转角度（原1.57，即180° 3.14 360°）
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    
    # 全局坐标系的名称
    # global_frame: odom_combined
    global_frame: odom
    robot_base_frame: base_footprint
    # 变换的超时时间，单位为秒。
    # transform_timeout: 0.1
    transform_timeout: 1.0
    # use_sim_time: True
    use_sim_time: False
    # 模拟提前的时间，单位为秒。
    simulate_ahead_time: 2.0
    # 最大旋转速度，单位为弧度 / 秒。
    max_rotational_vel: 0.7
    # 最小旋转速度，单位为弧度 / 秒。
    min_rotational_vel: 0.3
    # 旋转加速度限制，单位为弧度 / 秒 ²。
    rotational_acc_lim: 3.0

robot_state_publisher:
  ros__parameters:
    # use_sim_time: True
    use_sim_time: False

# 是航点跟随器节点。
waypoint_follower:
  ros__parameters:
    loop_rate: 20
    # 是否在失败时停止，false表示不停止。
    stop_on_failure: true
    # 航点任务执行器插件的名称
    waypoint_task_executor_plugin: "wait_at_waypoint"   
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200
